<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITNESS ED - Share Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
  <style>
    .share-shell { max-width: 720px; }
    .share-stage {
      display: flex; justify-content: center; padding: 1rem 0;
      background: var(--surface-soft); border-radius: 24px;
    }
    .share-preview {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 9 / 16;
      height: auto;
      border-radius: 20px;
      box-shadow: var(--shadow);
      background: #000;
    }
    .template-rail {
      display: flex; gap: 0.7rem; overflow-x: auto;
      padding: 0.4rem 0.2rem 0.8rem;
      scroll-snap-type: x mandatory;
    }
    .template-rail::-webkit-scrollbar { height: 4px; }
    .template-rail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .template-card {
      flex: 0 0 88px;
      cursor: pointer;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid transparent;
      background: var(--panel);
      transition: transform 0.15s, border-color 0.15s;
      scroll-snap-align: start;
      display: flex; flex-direction: column;
    }
    .template-card:hover { transform: translateY(-2px); }
    .template-card.active { border-color: var(--accent); }
    .template-card canvas {
      width: 100%; height: 142px; display: block;
    }
    .template-card .tname {
      font-size: 0.7rem; text-align: center;
      padding: 0.35rem 0.25rem; color: var(--text);
      font-weight: 600;
    }
    .share-tools {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
      margin-top: 0.8rem;
    }
    .share-tools label { font-size: 0.85rem; color: var(--muted); }
    .share-tools input[type=file] { width: 100%; }
    .clear-bg {
      grid-column: span 2;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 0.6rem; border-radius: 12px;
      cursor: pointer; font-weight: 600;
    }
    .clear-bg:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body class="app-page" data-page="share">
  <main class="app-shell share-shell">
    <header class="share-header">
      <div class="brand">FITNESS ED - Share</div>
      <a href="{{ url_for('history') }}" class="logout-btn" style="color:var(--accent)">Back</a>
    </header>

    <section class="timeline">
      <h3>Choose a Template</h3>
      <div class="template-rail" id="templateRail"></div>

      <div class="share-stage">
        <canvas id="shareCanvas" width="1080" height="1920" class="share-preview"></canvas>
      </div>

      <div class="share-tools">
        <label>
          Background Image
          <input id="backgroundInput" type="file" accept="image/*" class="todo-input compact-input" />
        </label>
        <label>
          Quick Action
          <button type="button" class="clear-bg" id="clearBgBtn" style="grid-column:auto">Remove background</button>
        </label>
      </div>

      <div class="share-action-grid" style="margin-top:0.8rem;">
        <button class="control-button primary" id="saveBtn" type="button">Save to Device</button>
        <button class="control-button secondary" id="igBtn" type="button">Instagram Stories</button>
        <button class="control-button secondary" id="snapBtn" type="button">Snapchat</button>
        <button class="control-button secondary" id="waBtn" type="button">WhatsApp Status</button>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  <script src="{{ url_for('static', filename='share.js') }}"></script>
</body>
</html>
