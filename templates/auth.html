<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITNESS ED - Authentic Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

<div class="auth-page-wrapper">
  
  <!-- Left Side: Interactive Visual -->
  <div class="auth-visual">
    <div id="canvas-container-auth"></div>
    <div class="visual-content">
      <h1>Unleash Your<br>Potential.</h1>
      <p>Securely log in to track every metric, analyze every workout, and transform your baseline.</p>
    </div>
  </div>

  <!-- Right Side: Clean Form Layout -->
  <div class="auth-form-wrapper">
    <div class="auth-form-container">
      <div style="margin-bottom: 2rem;">
        <a href="{{ url_for('landing') }}" style="text-decoration:none; color:var(--text); font-weight:700; letter-spacing:2px;">FITNESS<span style="color:var(--accent);">ED</span></a>
      </div>

      <h2 id="formTitle">Welcome Back</h2>
      <p id="formSubtitle">Securely sign in to your dashboard</p>

      <form id="authForm" action="/login" method="POST">
        
        <div class="input-group" id="usernameGroup" style="display:none;">
          <input type="text" name="username" id="username" placeholder=" " />
          <label for="username">Athlete Name</label>
        </div>

        <div class="input-group">
          <input type="email" name="email" id="email" required placeholder=" " />
          <label for="email">Email Address</label>
        </div>

        <div class="input-group">
          <input type="password" name="password" id="password" required placeholder=" " />
          <label for="password">Password</label>
          <button type="button" class="btn-toggle-pass" id="btnTogglePass">👁</button>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
          <span class="btn-text" id="btnText">Log In</span>
          <span class="btn-loader"></span>
        </button>

        <div class="social-login">
          <p>Or continue with</p>
          <div class="social-btns">
            <button type="button" class="btn-social">Google</button>
            <button type="button" class="btn-social">Apple</button>
          </div>
        </div>

        <p class="auth-switch">
          <span id="switchPrompt">Don't have an account?</span> 
          <a href="#" id="toggleMode">Sign up</a>
        </p>
      </form>
    </div>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // DOM Elements
  const authForm = document.getElementById("authForm");
  const toggleMode = document.getElementById("toggleMode");
  const usernameGroup = document.getElementById("usernameGroup");
  const formTitle = document.getElementById("formTitle");
  const formSubtitle = document.getElementById("formSubtitle");
  const btnText = document.getElementById("btnText");
  const switchPrompt = document.getElementById("switchPrompt");
  const btnSubmit = document.getElementById("btnSubmit");
  const passwordInput = document.getElementById("password");
  const btnTogglePass = document.getElementById("btnTogglePass");

  let isLogin = true;

  // Toggle Login/Register
  toggleMode.addEventListener('click', (e) => {
    e.preventDefault();
    isLogin = !isLogin;
    
    // Slight fade out transition effect on switch
    authForm.style.opacity = '0.5';
    setTimeout(() => {
        if(isLogin) {
            usernameGroup.style.display = "none";
            document.getElementById('username').removeAttribute('required');
            authForm.action = "/login";
            formTitle.innerText = "Welcome Back";
            formSubtitle.innerText = "Securely sign in to your dashboard";
            btnText.innerText = "Log In";
            toggleMode.innerText = "Sign up";
            switchPrompt.innerText = "Don't have an account?";
        } else {
            usernameGroup.style.display = "block";
            document.getElementById('username').setAttribute('required', 'required');
            authForm.action = "/register";
            formTitle.innerText = "Join the Movement";
            formSubtitle.innerText = "Create an account to track your progress";
            btnText.innerText = "Create Account";
            toggleMode.innerText = "Log in";
            switchPrompt.innerText = "Already have an account?";
        }
        authForm.style.opacity = '1';
    }, 150);
  });

  // Password Visibility Toggle
  btnTogglePass.addEventListener('click', () => {
    if(passwordInput.type === 'password') {
        passwordInput.type = 'text';
        btnTogglePass.style.color = 'var(--accent)';
    } else {
        passwordInput.type = 'password';
        btnTogglePass.style.color = 'var(--muted)';
    }
  });

  // Submit Loading Animation
  authForm.addEventListener('submit', () => {
     btnSubmit.classList.add('loading');
  });

  // Three.js Interactive 3D Background Setup
  const init3DAuth = () => {
    const container = document.getElementById('canvas-container-auth');
    if(!container) return; // for mobile when it's display:none

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Create a complex TorusKnot representing continuous loop/infinity/fitness muscle fibers
    const geometry = new THREE.TorusKnotGeometry(7, 1.5, 120, 16);
    
    const wireframeMaterial = new THREE.MeshBasicMaterial({ 
      color: 0x4ef2b3, wireframe: true, transparent: true, opacity: 0.15 
    });
    
    const solidMaterial = new THREE.MeshPhongMaterial({
      color: 0x071311, shininess: 80, specular: 0x28a0f0, flatShading: true
    });

    const mesh = new THREE.Mesh(geometry, solidMaterial);
    const wireframe = new THREE.Mesh(geometry, wireframeMaterial);
    wireframe.scale.set(1.02, 1.02, 1.02);
    
    const group = new THREE.Group();
    group.add(mesh);
    group.add(wireframe);
    scene.add(group);

    // Dynamic Lighting
    const light1 = new THREE.PointLight(0x4ef2b3, 1, 100);
    light1.position.set(10, 10, 10);
    scene.add(light1);
    
    const light2 = new THREE.PointLight(0x28a0f0, 1, 100);
    light2.position.set(-10, -10, 10);
    scene.add(light2);

    camera.position.z = 25;

    // Mouse Interaction
    let targetX = 0; let targetY = 0;
    document.addEventListener('mousemove', (e) => {
      targetX = (e.clientX - window.innerWidth / 2) * 0.0015;
      targetY = (e.clientY - window.innerHeight / 2) * 0.0015;
    });

    const animate = function () {
      requestAnimationFrame(animate);
      
      // Idle spin + Parallax
      group.rotation.x += 0.001;
      group.rotation.y += 0.002;
      
      // Smooth interpolation for mouse track
      group.rotation.x += (targetY - group.rotation.x) * 0.05;
      group.rotation.y += (targetX - group.rotation.y) * 0.05;

      renderer.render(scene, camera);
    };

    window.addEventListener('resize', () => {
      if(container.clientWidth > 0) {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      }
    });

    animate();
  };

  window.addEventListener('load', init3DAuth);
</script>

</body>
</html>
