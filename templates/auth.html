<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join FITNESS ED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #071311;
        --panel: rgba(13, 29, 27, 0.96);
        --border: rgba(160, 255, 220, 0.14);
        --text: #ecfff7;
        --muted: #96b6ad;
        --accent: #4ef2b3;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, rgba(78, 242, 179, 0.15), transparent 30%), var(--bg);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .auth-container {
        width: 100%;
        max-width: 400px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 32px;
        padding: 2.5rem 2rem;
        box-shadow: var(--shadow);
      }

      .header { text-align: center; margin-bottom: 2rem; }
      .header h1 { font-size: 1.8rem; margin: 0; letter-spacing: 1px; }
      .header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }

      .form-group { margin-bottom: 1.2rem; }
      label { display: block; font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px; }
      
      input {
        width: 100%;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 16px;
        color: var(--text);
        font-family: inherit;
        transition: 0.2s;
        box-sizing: border-box;
      }

      input:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }

      .btn-primary {
        width: 100%;
        padding: 1rem;
        background: var(--accent);
        border: none;
        border-radius: 16px;
        color: #042417;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 1rem;
        transition: transform 0.2s;
      }

      .btn-primary:active { transform: scale(0.98); }

      .toggle-text {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .toggle-text span { color: var(--accent); cursor: pointer; font-weight: 700; }
      .hidden { display: none; }
    </style>
  </head>
  <body>

    <div class="auth-container">
      <div class="header">
        <h1 id="authTitle">Create Account</h1>
        <p id="authSubtitle">Start your fitness journey today.</p>
      </div>

      <form id="authForm" action="/register" method="POST">
        
        <div class="form-group" id="nameGroup">
          <label>Full Name</label>
          <input type="text" name="username" id="regName" placeholder="Full Name" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Sign Up</button>
      </form>

      <div class="toggle-text">
        <span id="toggleLink">Already have an account? Log In</span>
      </div>
    </div>

    <script>
      const authTitle = document.getElementById('authTitle');
      const authSubtitle = document.getElementById('authSubtitle');
      const authForm = document.getElementById('authForm');
      const nameGroup = document.getElementById('nameGroup');
      const submitBtn = document.getElementById('submitBtn');
      const toggleLink = document.getElementById('toggleLink');
      const regNameInput = document.getElementById('regName');

      let isLogin = false;

      toggleLink.addEventListener('click', () => {
        isLogin = !isLogin;

        if (isLogin) {
          authTitle.innerText = "Welcome Back";
          authSubtitle.innerText = "Log in to track your progress.";
          submitBtn.innerText = "Log In";
          toggleLink.innerText = "New here? Create an account";
          nameGroup.classList.add('hidden');
          regNameInput.removeAttribute('required');
          authForm.action = "/login"; 
        } else {
          authTitle.innerText = "Create Account";
          authSubtitle.innerText = "Start your fitness journey today.";
          submitBtn.innerText = "Sign Up";
          toggleLink.innerText = "Already have an account? Log In";
          nameGroup.classList.remove('hidden');
          regNameInput.setAttribute('required', '');
          authForm.action = "/register"; 
        }
      });

      authForm.addEventListener('submit', () => {
        if (!isLogin) {
          localStorage.setItem("fitnessEdUserName", regNameInput.value);
        }
      });
    </script>
  </body>
</html>
