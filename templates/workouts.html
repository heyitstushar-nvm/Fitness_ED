<body class="app-page" data-page="workouts">
  <main class="app-shell workouts-shell">
    <header class="workouts-header">
      <div class="brand">FITNESS ED - Workouts</div>
      <a href="{{ url_for('home') }}" class="logout-btn" style="color:var(--accent)">Back to Main</a>
    </header>

    <section class="hero-card workouts-hero">
      <div class="eyebrow">Workout Finder</div>
      <h1>Tap a muscle to find exercises.</h1>
      <p>Exercises are fetched from an API with safe fallback suggestions.</p>
    </section>

    <section class="workout-layout">
      <article class="body-card">
        <div class="muscle-board">
          <div class="muscle-board-header">
            <h3>Tap Muscle Group</h3>

              <label for="viewFront">Front</label>
              <input type="radio" id="viewBack" name="bodyView" value="back">
              <label for="viewBack">Back</label>
              <div class="pill-slider"></div>
            </div>
          </div>
