<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITNESS ED - Share Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
  <style>
    .share-shell { max-width: 720px; }
    .share-stage {
      display: flex; justify-content: center; padding: 0.5rem 0;
      background: transparent;
    }
    .share-preview {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 9 / 16;
      height: auto;
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: block;
    }
    .template-rail {
      display: flex; gap: 0.7rem; overflow-x: auto;
      padding: 0.4rem 0.2rem 0.8rem;
      scroll-snap-type: x mandatory;
    }
    .template-rail::-webkit-scrollbar { height: 4px; }
    .template-rail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .template-card {
      flex: 0 0 88px;
      cursor: pointer;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid transparent;
      background: var(--panel);
      transition: transform 0.15s, border-color 0.15s;
      scroll-snap-align: start;
      display: flex; flex-direction: column;
    }
    .template-card:hover { transform: translateY(-2px); }
    .template-card.active { border-color: var(--accent); }
    .template-card canvas {
      width: 100%; height: 142px; display: block;
    }
    .template-card .tname {
      font-size: 0.7rem; text-align: center;
      padding: 0.35rem 0.25rem; color: var(--text);
      font-weight: 600;
    }
    .bg-toolbar {
      display: flex; align-items: center; gap: 0.6rem;
      margin-top: 1rem;
      padding: 0.6rem;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .bg-toolbar input[type=file] { display: none; }
    .bg-btn {
      flex: 1;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0.75rem 0.9rem;
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer; font-weight: 600; font-size: 0.9rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .bg-btn:hover { border-color: var(--accent); color: var(--accent); }
    .bg-btn.ghost {
      flex: 0 0 auto; background: transparent; color: var(--muted);
    }
    .bg-btn.ghost:hover { color: var(--warning); border-color: var(--warning); }
    /* Crop modal */
    .crop-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      display: none; align-items: center; justify-content: center; z-index: 9999;
      padding: 1rem;
    }
    .crop-overlay.open { display: flex; }
    .crop-modal {
      width: 100%; max-width: 380px;
      background: var(--panel-strong); border: 1px solid var(--border);
      border-radius: 20px; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.8rem;
    }
    .crop-stage {
      width: 100%; aspect-ratio: 9 / 16;
      background: #000; border-radius: 14px; overflow: hidden;
      position: relative; touch-action: none;
    }
    .crop-stage canvas { width: 100%; height: 100%; display: block; cursor: grab; }
    .crop-stage canvas:active { cursor: grabbing; }
    .crop-controls {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .crop-controls input[type=range] { flex: 1; }
    .crop-actions { display: flex; gap: 0.6rem; }
    .crop-actions button { flex: 1; }
  </style>
</head>
<body class="app-page" data-page="share">
  <main class="app-shell share-shell">
    <header class="share-header">
      <div class="brand">FITNESS ED - Share</div>
      <a href="{{ url_for('history') }}" class="logout-btn" style="color:var(--accent)">Back</a>
    </header>

    <section class="timeline">
      <h3>Choose a Template</h3>
      <div class="template-rail" id="templateRail"></div>

      <div class="share-stage">
        <canvas id="shareCanvas" width="1080" height="1920" class="share-preview"></canvas>
      </div>

      <div class="bg-toolbar">
        <input id="backgroundInput" type="file" accept="image/*" />
        <button type="button" class="bg-btn" id="pickBgBtn">+ Add Background</button>
        <button type="button" class="bg-btn ghost" id="clearBgBtn" title="Remove background">Remove</button>
      </div>

      <div class="share-action-grid" style="margin-top:0.8rem; display:grid; grid-template-columns:1fr 1fr; gap:0.6rem;">
        <button class="control-button secondary" id="saveBtn" type="button">Save to Device</button>
        <button class="control-button primary" id="shareBtn" type="button">Share</button>
      </div>
    </section>
  </main>

  <div class="crop-overlay" id="cropOverlay" role="dialog" aria-label="Crop image">
    <div class="crop-modal">
      <div style="font-weight:700;">Crop to fit</div>
      <div class="crop-stage" id="cropStage">
        <canvas id="cropCanvas" width="540" height="960"></canvas>
      </div>
      <div class="crop-controls">
        <span style="font-size:0.8rem;color:var(--muted);">Zoom</span>
        <input type="range" id="cropZoom" min="1" max="4" step="0.01" value="1" />
      </div>
      <div class="crop-actions">
        <button type="button" class="control-button secondary" id="cropCancel">Cancel</button>
        <button type="button" class="control-button primary" id="cropApply">Apply</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  <script src="{{ url_for('static', filename='share.js') }}"></script>
</body>
</html>
