<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITNESS ED - Daily Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
  <body class="app-page" data-page="todo">
    <main class="app-shell" style="max-width: 760px; padding-top: 2rem;">
      <header style="display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:1rem;">
        <div class="brand">FITNESS ED - Daily Tasks</div>
        <a href="{{ url_for('home') }}" class="logout-btn" style="color:var(--accent)">Back to Main</a>
      </header>

      <section class="screen active">
        <div class="todo-screen">
          <div class="eyebrow">Task Workspace</div>
          <h2>Plan your next fitness tasks.</h2>
          <p>Add reminders, workout notes, and daily goals.</p>

          <form class="todo-form" id="todoForm">
            <input class="todo-input" id="todoInput" type="text" placeholder="Add a task like Morning walk for 30 mins" maxlength="120" required />
            <button class="todo-add" type="submit">Add Task</button>
          </form>

          <div class="todo-meta">
            <span id="todoCount">0 tasks</span>
            <span id="todoDoneCount">0 completed</span>
          </div>

          <ul class="todo-list" id="todoList"></ul>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
    <script>
      const todoForm = document.getElementById('todoForm');
      const todoInput = document.getElementById('todoInput');
      const todoList = document.getElementById('todoList');
      const todoCount = document.getElementById('todoCount');
      const todoDoneCount = document.getElementById('todoDoneCount');

      function updateCounts() {
        const total = todoList.querySelectorAll('.todo-item').length;
        const done = todoList.querySelectorAll('.todo-item.done').length;
        todoCount.innerText = `${total} ${total === 1 ? 'task' : 'tasks'}`;
        todoDoneCount.innerText = `${done} completed`;
      }

      function handleDelete(button, id) {
        button.parentElement.remove();
        updateCounts();
        fetch(`/api/todos/${id}`, { method: 'DELETE' });
      }

      function handleCheck(checkbox, id) {
        checkbox.parentElement.classList.toggle('done', checkbox.checked);
        updateCounts();
        fetch(`/api/todos/${id}/toggle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: checkbox.checked })
        });
      }

      function addTodoToDOM(id, text, timeText, isDone, prepend) {
        const li = document.createElement('li');
        li.className = `todo-item${isDone ? ' done' : ''}`;
        li.innerHTML = `
          <input type="checkbox" onchange="handleCheck(this, ${id})" ${isDone ? 'checked' : ''} />
          <div class="todo-text">
            <strong>${text}</strong>
            <span>${timeText}</span>
          </div>
          <button type="button" class="todo-delete" onclick="handleDelete(this, ${id})">Delete</button>
        `;

        if (prepend) {
          todoList.prepend(li);
        } else {
          todoList.appendChild(li);
        }

        updateCounts();
      }

      function loadTodos() {
        fetch('/api/todos')
          .then((res) => res.json())
          .then((tasks) => {
            todoList.innerHTML = '';
            tasks.forEach((task) => addTodoToDOM(task.id, task.text, task.time, task.done, false));
          });
      }

      todoForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const text = todoInput.value.trim();
        if (!text) return;

        fetch('/api/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        })
          .then((res) => res.json())
          .then((data) => addTodoToDOM(data.id, data.text, data.time, data.done, true));

        todoInput.value = '';
      });

      loadTodos();
    </script>
  </body>
</html>
